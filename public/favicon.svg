<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="headphoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="earcupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>

  <!-- Headband arc -->
  <path
    d="M10 32 C10 14 22 6 32 6 C42 6 54 14 54 32"
    fill="none"
    stroke="url(#headphoneGrad)"
    stroke-width="5.5"
    stroke-linecap="round"
  />

  <!-- Left ear cup outer -->
  <rect x="5" y="30" width="13" height="20" rx="6" fill="url(#earcupGrad)"/>
  <!-- Left ear cup inner highlight -->
  <rect x="8" y="34" width="7" height="12" rx="3.5" fill="#60a5fa" opacity="0.35"/>

  <!-- Right ear cup outer -->
  <rect x="46" y="30" width="13" height="20" rx="6" fill="url(#earcupGrad)"/>
  <!-- Right ear cup inner highlight -->
  <rect x="49" y="34" width="7" height="12" rx="3.5" fill="#60a5fa" opacity="0.35"/>

  <!-- Left stem connecting band to ear cup -->
  <rect x="10" y="28" width="5" height="6" rx="2" fill="url(#headphoneGrad)"/>
  <!-- Right stem connecting band to ear cup -->
  <rect x="49" y="28" width="5" height="6" rx="2" fill="url(#headphoneGrad)"/>
</svg>